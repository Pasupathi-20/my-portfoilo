<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Pasupathi Ragavan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- Navbar -->
  <nav class="nav" id="navbar">
    <a href="/" class="nav-logo">Pasupathi Ragavan</a>
    <button class="nav-hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a></li>
      <li><a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About</a></li>
      <li><a href="/projects" class="{% if request.path == '/projects' %}active{% endif %}">Projects</a></li>
      <li><a href="/contact" class="{% if request.path == '/contact' %}active{% endif %}">Contact</a></li>
    </ul>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>© 2026 Pasupathi Ragavan T &mdash; Built with Flask &amp; Python</p>
  </footer>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
